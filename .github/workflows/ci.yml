name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync and install dev tools
        run: |
          uv sync --extra dev
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu

      # Bundled ``espaloma_v0_0_8.eqx`` is in-repo; PyTorch checkpoint is only for JAX vs torch parity tests.
      - name: Download reference PyTorch checkpoint (parity tests)
        run: |
          curl -fsSL -o /tmp/espaloma_model.pt \
            "https://github.com/choderalab/espaloma_charge/releases/download/v0.0.8/model.pt"

      - name: Run tests
        run: uv run pytest tests/ -v
